services:
  db:
    image: pgvector/pgvector:pg16
    container_name: orbit_db
    environment:
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: orbit_secret
      POSTGRES_DB: orbit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orbit_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orbit_backend
    env_file: ./backend/.env
    environment:
      # Overrides the localhost value in .env — containers talk via service name 'db'
      - DATABASE_URL=postgresql://orbit:orbit_secret@db:5432/orbit
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    networks:
      - orbit_net
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orbit_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - orbit_net
    command: npm run dev

volumes:
  postgres_data:
  uploads:

networks:
  orbit_net:
    driver: bridge
